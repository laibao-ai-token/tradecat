name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install ruff
        run: pip install ruff
      
      - name: Lint with ruff
        run: ruff check services/ services-preview/ libs/ scripts/ --ignore E501,E402

      - name: Guard print in services source
        run: python scripts/check_no_print_services.py

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Syntax check
        run: |
          python - <<'PY'
          import py_compile
          import subprocess
          import sys

          roots = ("services", "services-preview", "libs", "scripts")
          out = subprocess.check_output(["git", "ls-files", "-z", "--", *roots], text=False)
          files = [p for p in out.decode("utf-8", errors="surrogateescape").split("\0") if p.endswith(".py")]

          failed = False
          for path in sorted(files):
              try:
                  py_compile.compile(path, doraise=True)
              except py_compile.PyCompileError as exc:
                  failed = True
                  print(f"[syntax-error] {path}: {exc.msg}", file=sys.stderr)

          print(f"checked_python_files={len(files)}")
          if failed:
              sys.exit(1)
          PY
